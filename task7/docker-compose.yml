version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s      
    restart: unless-stopped

  rag-bot:
    build: .
    container_name: rag-bot
    ports:
      - "8001:8001"
    volumes:
      - ./faiss_db:/faiss_db
      - ./prompts:/prompts
      - ./golden_set.json:/app/golden_set.json
    environment:
      - OLLAMA_HOST=http://ollama:11434                                                                       
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s    
    restart: unless-stopped

volumes:
  ollama_data: